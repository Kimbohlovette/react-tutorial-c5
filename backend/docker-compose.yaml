# Using Supabase for database
# Local PostgreSQL is no longer needed
# To test locally with PostgreSQL, uncomment the db service below

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: piggydb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d piggydb" ]
      interval: 5s
      retries: 10
    ports:
      - 5432:5432

volumes:
  pgdata:
